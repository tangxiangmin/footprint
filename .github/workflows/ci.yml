name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# 同一分支新 push 取消进行中的旧任务
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Test (Vitest)
        run: pnpm test

      - name: Build (tsup)
        run: pnpm build
